<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDBROWSER</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#04050a;
  --panel:#080c14;
  --border:#1a2235;
  --accent:#00f5c4;
  --accent2:#7b5ef8;
  --red:#ff3d6b;
  --yellow:#ffd166;
  --text:#c4d4e8;
  --dim:#334155;
  --glow:rgba(0,245,196,0.15);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Mono',monospace;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Animated background grid */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  animation:gridscroll 20s linear infinite;
  pointer-events:none;
  z-index:0;
}

/* Radial glow in center */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%, rgba(123,94,248,0.07) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

@keyframes gridscroll{
  0%{background-position:0 0;}
  100%{background-position:40px 40px;}
}

/* Scanlines */
.scanlines{
  position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}

/* Corner decorations */
.corner{position:fixed;width:60px;height:60px;pointer-events:none;z-index:10;}
.corner::before,.corner::after{content:'';position:absolute;background:var(--accent);opacity:0.4;}
.corner-tl{top:12px;left:12px;}
.corner-tl::before{width:2px;height:30px;top:0;left:0;}
.corner-tl::after{width:30px;height:2px;top:0;left:0;}
.corner-tr{top:12px;right:12px;}
.corner-tr::before{width:2px;height:30px;top:0;right:0;}
.corner-tr::after{width:30px;height:2px;top:0;right:0;}
.corner-bl{bottom:12px;left:12px;}
.corner-bl::before{width:2px;height:30px;bottom:0;left:0;}
.corner-bl::after{width:30px;height:2px;bottom:0;left:0;}
.corner-br{bottom:12px;right:12px;}
.corner-br::before{width:2px;height:30px;bottom:0;right:0;}
.corner-br::after{width:30px;height:2px;bottom:0;right:0;}

/* Main layout */
#app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100vh;
  padding:16px;
  gap:10px;
}

/* Title bar */
#titlebar{
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;
  letter-spacing:0.2em;color:var(--accent);
  text-shadow:0 0 20px rgba(0,245,196,0.5);
}
.logo em{color:var(--accent2);font-style:normal;}
.build-tag{
  font-size:0.6rem;letter-spacing:0.15em;color:var(--dim);
  border:1px solid var(--dim);padding:2px 8px;border-radius:2px;
}
.sys-time{margin-left:auto;font-size:0.65rem;color:var(--dim);letter-spacing:0.1em;}

/* Browser window */
#browser{
  flex:1;display:flex;flex-direction:column;
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
  position:relative;
  background:var(--panel);
  box-shadow:0 0 40px rgba(0,245,196,0.05), inset 0 1px 0 rgba(255,255,255,0.03);
  min-height:0;
}

/* Browser chrome */
#chrome{
  flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  background:rgba(0,0,0,0.3);
  border-bottom:1px solid var(--border);
}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:10px;height:10px;border-radius:50%;}
.dot-r{background:#ff5f57;}.dot-y{background:#febc2e;}.dot-g{background:#28c840;}

.nav-btn{
  background:transparent;border:1px solid var(--border);color:var(--dim);
  padding:4px 9px;border-radius:2px;cursor:pointer;font-family:'Space Mono',monospace;
  font-size:12px;transition:all 0.15s;
}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px var(--glow);}
.nav-btn:disabled{opacity:0.25;cursor:not-allowed;}

#urlbar{
  flex:1;background:rgba(0,0,0,0.4);
  border:1px solid var(--border);border-radius:2px;
  padding:6px 12px;
  font-family:'Space Mono',monospace;font-size:12px;
  color:var(--accent);outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
  caret-color:var(--accent);
}
#urlbar:focus{border-color:var(--accent);box-shadow:0 0 12px var(--glow);}
#urlbar::placeholder{color:var(--dim);}

#goBtn{
  background:transparent;border:1px solid var(--accent);
  color:var(--accent);padding:6px 16px;border-radius:2px;
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:0.1em;cursor:pointer;text-transform:uppercase;
  transition:all 0.15s;white-space:nowrap;
}
#goBtn:hover:not(:disabled){background:var(--glow);box-shadow:0 0 16px var(--glow);}
#goBtn:disabled{opacity:0.35;cursor:not-allowed;}

/* Status bar */
#statusbar{
  flex-shrink:0;display:flex;align-items:center;gap:12px;
  padding:5px 14px;
  background:rgba(0,0,0,0.2);
  border-bottom:1px solid var(--border);
  font-size:10px;letter-spacing:0.08em;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:all 0.3s;flex-shrink:0;}
.status-dot.ready{background:var(--accent);box-shadow:0 0 6px rgba(0,245,196,0.6);}
.status-dot.loading{background:var(--yellow);box-shadow:0 0 6px rgba(255,209,102,0.6);animation:pulse 0.8s ease-in-out infinite;}
.status-dot.error{background:var(--red);box-shadow:0 0 6px rgba(255,61,107,0.6);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
#status-txt{color:var(--dim);}
#proxy-txt{margin-left:auto;color:var(--dim);}

/* Viewport */
#viewport{flex:1;position:relative;overflow:hidden;min-height:0;}

#page-frame{
  width:100%;height:100%;border:none;
  background:#fff;display:none;
}

#placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.ph-icon{
  width:64px;height:64px;opacity:0.15;
}
.ph-text{font-size:11px;letter-spacing:0.2em;color:var(--dim);text-transform:uppercase;}
.ph-sub{font-size:10px;color:var(--dim);opacity:0.5;letter-spacing:0.1em;}

#loading-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(4,5,10,0.92);
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
#loading-overlay.show{display:flex;}
.load-bar-wrap{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.load-bar{height:100%;width:30%;background:var(--accent);border-radius:1px;animation:loadslide 1.2s ease-in-out infinite;}
@keyframes loadslide{0%{transform:translateX(-100%);}100%{transform:translateX(500%);};}
#loading-msg{font-size:11px;letter-spacing:0.15em;color:var(--dim);text-transform:uppercase;}

#err-box{
  display:none;position:absolute;inset:0;
  align-items:center;justify-content:center;flex-direction:column;gap:10px;
}
#err-box.show{display:flex;}
#err-title-el{font-size:13px;color:var(--red);letter-spacing:0.1em;}
#err-msg{font-size:11px;color:var(--dim);max-width:400px;text-align:center;line-height:1.8;}
.retry-btn{
  margin-top:8px;background:transparent;border:1px solid var(--red);
  color:var(--red);padding:6px 20px;border-radius:2px;
  font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;
  letter-spacing:0.1em;text-transform:uppercase;transition:all 0.15s;
}
.retry-btn:hover{background:rgba(255,61,107,0.1);}
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="app">
  <div id="titlebar">
    <div class="logo">VOID<em>BROWSER</em></div>
    <div class="build-tag">BUILD 001</div>
    <div class="sys-time" id="clock"></div>
  </div>

  <div id="browser">
    <div id="chrome">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <button class="nav-btn" id="backBtn">&#8592;</button>
      <button class="nav-btn" id="fwdBtn">&#8594;</button>
      <button class="nav-btn" id="reloadBtn">&#8635;</button>
      <input id="urlbar" type="text" placeholder="enter target url..." value="https://example.com" spellcheck="false"/>
      <button id="goBtn">EXEC</button>
    </div>
    <div id="statusbar">
      <div class="status-dot" id="sdot"></div>
      <span id="status-txt">STANDBY</span>
      <span id="proxy-txt"></span>
    </div>
    <div id="viewport">
      <div id="placeholder">
        <svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <div class="ph-text">NO TARGET ACQUIRED</div>
        <div class="ph-sub">enter a url to begin</div>
      </div>
      <div id="loading-overlay">
        <div class="load-bar-wrap"><div class="load-bar"></div></div>
        <span id="loading-msg">FETCHING...</span>
      </div>
      <div id="err-box">
        <span id="err-title-el">CONNECTION FAILED</span>
        <span id="err-msg"></span>
        <button class="retry-btn" id="retryBtn">RETRY</button>
      </div>
      <iframe id="page-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals"></iframe>
    </div>
  </div>
</div>

<script>
const urlbar=document.getElementById('urlbar');
const goBtn=document.getElementById('goBtn');
const backBtn=document.getElementById('backBtn');
const fwdBtn=document.getElementById('fwdBtn');
const reloadBtn=document.getElementById('reloadBtn');
const sdot=document.getElementById('sdot');
const statusTxt=document.getElementById('status-txt');
const proxyTxt=document.getElementById('proxy-txt');
const placeholder=document.getElementById('placeholder');
const loadingOverlay=document.getElementById('loading-overlay');
const loadingMsg=document.getElementById('loading-msg');
const errBox=document.getElementById('err-box');
const errMsg=document.getElementById('err-msg');
const pageFrame=document.getElementById('page-frame');

// Clock
function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=
    now.toLocaleTimeString('en-US',{hour12:false})+' // '+now.toLocaleDateString('en-US');
}
tick();setInterval(tick,1000);

const PROXIES=[
  url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
  url=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url=>`https://thingproxy.freeboard.io/fetch/${url}`,
];

let hist=[],histPos=-1,lastUrl='';

function setStatus(state,txt){
  sdot.className='status-dot '+state;
  statusTxt.textContent=txt.toUpperCase();
}

function rebase(html,url){
  const b=`<base href="${url}">`;
  return html.includes('<head>')?html.replace('<head>','<head>'+b):b+html;
}

function inject(html,pageUrl){
  const s=`<script>(function(){
    var BASE='${pageUrl}';
    function res(u){try{return new URL(u,BASE).href;}catch(e){return u;}}
    document.addEventListener('click',function(e){
      var a=e.target.closest('a');
      if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.startsWith('#')||h.startsWith('javascript:'))return;
      e.preventDefault();
      window.parent.postMessage({t:'nav',url:res(h)},'*');
    },true);
    document.addEventListener('submit',function(e){
      e.preventDefault();
      var f=e.target,act=res(f.getAttribute('action')||BASE),meth=(f.method||'get').toUpperCase();
      var d={};new FormData(f).forEach(function(v,k){d[k]=v;});
      window.parent.postMessage({t:'form',url:act,method:meth,data:d},'*');
    },true);
  })();<\/script>`;
  return html.includes('</head>')?html.replace('</head>',s+'</head>'):s+html;
}

function showLoading(msg){
  placeholder.style.display='none';
  pageFrame.style.display='none';
  errBox.classList.remove('show');
  loadingMsg.textContent=(msg||'FETCHING...').toUpperCase();
  loadingOverlay.classList.add('show');
}

function showPage(html){
  loadingOverlay.classList.remove('show');
  errBox.classList.remove('show');
  placeholder.style.display='none';
  pageFrame.srcdoc=html;
  pageFrame.style.display='block';
}

function showError(detail){
  loadingOverlay.classList.remove('show');
  pageFrame.style.display='none';
  placeholder.style.display='none';
  errMsg.textContent=detail||'';
  errBox.classList.add('show');
}

function updateNav(){
  backBtn.disabled=histPos<=0;
  fwdBtn.disabled=histPos>=hist.length-1;
}

async function fetchPage(url){
  let lastErr;
  for(let i=0;i<PROXIES.length;i++){
    proxyTxt.textContent='PROXY '+(i+1)+'/'+PROXIES.length;
    loadingMsg.textContent='TRYING PROXY '+(i+1)+'...';
    try{
      const r=await fetch(PROXIES[i](url));
      if(!r.ok) throw new Error('HTTP '+r.status);
      const ct=r.headers.get('content-type')||'';
      const text=await r.text();
      if(!text||text.length<50) throw new Error('empty response');
      proxyTxt.textContent='PROXY '+(i+1)+' OK';
      return text;
    }catch(e){lastErr=e;}
  }
  throw new Error('all proxies failed: '+lastErr?.message);
}

async function navigate(url,method,formData,push){
  if(!url)return;
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  urlbar.value=url;
  lastUrl=url;
  if(push!==false){
    hist=hist.slice(0,histPos+1);
    hist.push(url);
    histPos=hist.length-1;
  }
  updateNav();
  goBtn.disabled=true;
  setStatus('loading','CONNECTING...');
  showLoading('CONNECTING TO '+new URL(url).hostname);

  try{
    let html;
    if(method==='POST'&&formData){
      // for POST forms try direct fetch first (CORS permitting), then proxies
      try{
        const r=await fetch(url,{
          method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:new URLSearchParams(formData).toString()
        });
        html=await r.text();
      }catch(e){
        html=await fetchPage(url);
      }
    }else{
      html=await fetchPage(url);
    }
    html=rebase(html,url);
    html=inject(html,url);
    showPage(html);
    setStatus('ready','LOADED');
    proxyTxt.textContent='';
  }catch(e){
    showError(e.message);
    setStatus('error','ERROR');
    proxyTxt.textContent='';
  }finally{
    goBtn.disabled=false;
  }
}

window.addEventListener('message',function(e){
  if(!e.data)return;
  if(e.data.t==='nav')navigate(e.data.url);
  if(e.data.t==='form')navigate(e.data.url,e.data.method,e.data.data);
});

goBtn.addEventListener('click',()=>navigate(urlbar.value));
urlbar.addEventListener('keydown',e=>{if(e.key==='Enter')navigate(urlbar.value);});
backBtn.addEventListener('click',()=>{if(histPos>0){histPos--;urlbar.value=hist[histPos];navigate(hist[histPos],null,null,false);}});
fwdBtn.addEventListener('click',()=>{if(histPos<hist.length-1){histPos++;urlbar.value=hist[histPos];navigate(hist[histPos],null,null,false);}});
reloadBtn.addEventListener('click',()=>navigate(lastUrl||urlbar.value,null,null,false));
document.getElementById('retryBtn').addEventListener('click',()=>navigate(lastUrl||urlbar.value,null,null,false));
updateNav();
</script>
</body>
</html>
